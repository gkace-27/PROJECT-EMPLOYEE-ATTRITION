<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Employee Attrition Dashboard</title>
  <link href='https://fonts.googleapis.com/css?family=Arimo' rel='stylesheet'>
  <style>
    body { font-family: 'Arimo', sans-serif; background: #f0f2f5; margin:0; padding:0;}
    .container { width: 90%; max-width: 1200px; margin:0 auto; padding:20px;}
    h1{text-align:center;color:#333;}
    .login, .dashboard {background:#fff; padding:30px; margin:50px auto; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
    input[type=text], input[type=password], input[type=number] {width:100%; padding:10px; margin:5px 0 15px 0; border:1px solid #ccc; border-radius:5px;}
    input[type=radio] {margin-right:5px;}
    button {background-color:#007bff; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; font-size:16px;}
    button:hover {background-color:#0056b3;}
    .section{margin-bottom:20px;}
    .shap, .explanation{text-align:center;margin-top:20px;}
    img.shap-plot{max-width:100%; height:auto; border-radius:10px;}
    .error{color:red;text-align:center;margin-bottom:20px;}
  </style>
</head>
<body>
<div class="container">
  <!-- Login Section -->
  <div class="login" id="login-section">
    <h1>Login</h1>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <form action="{{ url_for('login') }}" method="POST">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter Username" required>
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter Password" required>
      <button type="submit">Login</button>
    </form>
  </div>

  <!-- Dashboard Section -->
  <div class="dashboard" id="dashboard-section" style="display:none;">
    <h1>Predict Employee Attrition</h1>
    <form action="{{ url_for('predict') }}" method="POST">
      <!-- Add form fields here (Age, BusinessTravel, etc.) similar to your previous HTML -->
      <div class="section">
        <label>Age:</label>
        <input type="number" name="Age" placeholder="18-80" min="18" max="80" required>
      </div>
      <div class="section">
        <label>Business Travel:</label>
        <input type="radio" name="BusinessTravel" value="Rarely">Rarely
        <input type="radio" name="BusinessTravel" value="Frequently">Frequently
        <input type="radio" name="BusinessTravel" value="No Travel">No Travel
      </div>
      <!-- Add remaining fields like in your HTML -->
      <button type="submit">Predict</button>
    </form>

    <div class="section shap">
      <h2>Prediction Result</h2>
      <h3>{{ prediction_text }}</h3>
    </div>

    <div class="section shap">
      <h2>SHAP Feature Contribution</h2>
      {% if shap_plot_url %}
      <img class="shap-plot" src="{{ shap_plot_url }}" alt="SHAP Plot">
      {% endif %}
    </div>

    <div class="section explanation">
      <h2>Explanation</h2>
      <p>{{ word_explanation }}</p>
    </div>
  </div>
</div>

<script>
  {% if logged_in %}
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('dashboard-section').style.display = 'block';
  {% endif %}
</script>

</body>
</html>
